services:
  home:
    build: ./home
    platform: linux/amd64
    command: gunicorn --bind 0.0.0.0:5000 main:app
    expose:
      - 5000

  nginx:
    build: ./nginx
    platform: linux/amd64
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - home
