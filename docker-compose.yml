networks:
  starbug_network:
    driver: bridge

services:
  holly:
    build:
      context: ./holly
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - starbug_network
    platform: linux/amd64
  navigator:
    build: ./navigator
    command: gunicorn --bind 0.0.0.0:5000 www_starbug_com:app
    expose:
      - 5000
    networks:
      - starbug_network
    platform: linux/amd64

  nginx:
    build: ./nginx
    depends_on:
      - navigator
      - holly
    networks:
      - starbug_network
    platform: linux/amd64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    secrets:
      - nginx_crt
      - nginx_key
      - nginx_dhparam

secrets:
  nginx_crt:
    file: ./nginx/certs/starbug.selfsigned.crt
  nginx_key:
    file: ./nginx/certs/starbug.selfsigned.key
  nginx_dhparam:
    file: ./nginx/certs/dhparam.pem
