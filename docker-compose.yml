networks:
  starbug_network:
    driver: bridge

services:
  holly:
    build:
      context: ./holly
      dockerfile: Dockerfile
    expose:
      - 3000
    networks:
      - starbug_network
    platform: linux/amd64
  holly-test:
    build:
      context: ./holly
      dockerfile: Dockerfile.dev
    command: sh -c "npx vitest --run && touch /tmp/tests-passed || exit 1"
    networks:
      - starbug_network
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/tests-passed"]
      interval: 5s
      timeout: 3s
      retries: 2
      start_period: 10s
  navigator:
    build: ./navigator
    command: gunicorn --bind 0.0.0.0:5000 www_starbug_com:app
    expose:
      - 5000
    networks:
      - starbug_network
    platform: linux/amd64
  nginx:
    build: ./nginx
    depends_on:
      holly:
        condition: service_started
      holly-test:
        condition: service_completed_successfully
      navigator:
        condition: service_started
    networks:
      - starbug_network
    platform: linux/amd64
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    secrets:
      - nginx_crt
      - nginx_key
      - nginx_dhparam

secrets:
  nginx_crt:
    file: ./nginx/certs/starbug.selfsigned.crt
  nginx_key:
    file: ./nginx/certs/starbug.selfsigned.key
  nginx_dhparam:
    file: ./nginx/certs/dhparam.pem
