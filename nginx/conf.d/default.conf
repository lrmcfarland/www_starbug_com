# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name starbug.com www.starbug.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name starbug.com www.starbug.com;
    http2 on;
    ssl_certificate /run/secrets/nginx_crt;
    ssl_certificate_key /run/secrets/nginx_key;
    ssl_dhparam /run/secrets/nginx_dhparam;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # frontend for the React app
    location / {
        proxy_pass http://navigator:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Reverse proxy for the API backend
    location /api/ {
        # match the service name in docker-compose.yml
        proxy_pass http://navigator:5000/api/;

        # Security and networking headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Enable WebSockets support (optional but recommended)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

}
